<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IntelliBuild - Ajouter un objet connecté</title>
    <script src="config.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { 
            background: url('https://images.pexels.com/photos/4040649/pexels-photo-4040649.jpeg') no-repeat center center fixed;
            background-size: cover; 
            display: flex; 
            min-height: 100vh;
            margin: 0;
        }
        .form-card { 
            background: rgba(255, 255, 255, 0.9); 
            backdrop-filter: blur(12px); 
            border-radius: 24px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.2); 
            border: 1px solid rgba(255,255,255,0.3);
        }
        .type-card {
            border: 1px solid #dbe3ef;
            background: #ffffff;
            border-radius: 14px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .type-card:hover {
            border-color: #34d399;
            transform: translateY(-2px);
        }
        .type-card.active {
            border-color: #10b981;
            background: #ecfdf5;
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.2);
        }
        .type-icon {
            width: 50px;
            height: 50px;
            margin: 0 auto 10px;
            border-radius: 12px;
            display: grid;
            place-items: center;
            background: #f1f5f9;
            color: #0f766e;
            font-size: 20px;
        }
        .type-card.active .type-icon { background: #10b981; color: white; }
        .field-card {
            border: 1px solid #dbe3ef;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 14px;
            padding: 15px;
            margin-bottom: 15px;
        }
        .field-input, .field-select {
            width: 100%;
            border: 1px solid #cbd5e1;
            border-radius: 11px;
            padding: 12px;
            margin-top: 5px;
        }
        .selected-type-pill {
            padding: 6px 15px;
            border-radius: 999px;
            font-weight: bold;
            font-size: 13px;
            background: #e2e8f0;
        }
        .selected-type-pill.active { background: #dcfce7; color: #065f46; }
    </style>
</head>
<body class="flex">
    <script src="sidebar-loader.js"></script>

    <main class="flex-1 p-8">
        <div class="max-w-4xl mx-auto">
            <div class="form-card p-10">
                <h1 class="text-3xl font-black text-gray-800 mb-2">Ajouter un objet IoT</h1>
                <p class="text-gray-500 mb-8">Standard W3C Thing Description - Sans saisie manuelle de description.</p>

                <div class="mb-8 p-6 bg-emerald-50 rounded-2xl border border-emerald-100">
                    <div class="flex items-center justify-between mb-4">
                        <h3 class="font-bold text-emerald-900">1. Sélectionnez un type d'objet (Template)</h3>
                        <span id="selectedTypePill" class="selected-type-pill">Aucun template choisi</span>
                    </div>
                    <div id="typeShowcase" class="grid grid-cols-3 gap-4">
                        <!-- Templates generated via JS -->
                    </div>
                </div>

                <form id="addForm" class="space-y-6">
                    <div class="field-card">
                        <label class="font-bold text-gray-700">2. Nom de l'objet</label>
                        <input type="text" id="objName" placeholder="Ex: Lampe Bureau 302" required class="field-input">
                    </div>

                    <div class="field-card">
                        <label class="font-bold text-gray-700">3. Localisation (Salle)</label>
                        <select id="objLoc" required class="field-select">
                            <option value="">-- Choisir une salle --</option>
                            <optgroup label="Salles">
                                <option value="Accueil">Accueil</option>
                                <option value="Cafétéria">Cafétéria</option>
                                <option value="Bureau RH">Bureau RH</option>
                                <option value="Salle de Réunion">Salle de Réunion</option>
                                <option value="Labo IoT A">Labo IoT A</option>
                            </optgroup>
                        </select>
                    </div>

                    <div id="descPreviewBox" class="field-card bg-gray-50 opacity-75">
                        <label class="font-bold text-gray-400">Description W3C TD (Automatique)</label>
                        <div id="templateDesc" class="mt-2 text-sm text-gray-500 italic">
                            Sélectionnez un template pour générer la description IoT.
                        </div>
                    </div>

                    <div class="flex gap-4">
                        <button type="button" onclick="window.location.href='index.html'" class="flex-1 py-4 bg-white border rounded-xl font-bold text-gray-600 hover:bg-gray-50">Annuler</button>
                        <button type="submit" class="flex-1 py-4 bg-emerald-600 text-white font-bold rounded-xl shadow-lg hover:bg-emerald-700">Enregistrer l'objet</button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <script>
        const apiBase = window.APP_CONFIG.API_BASE;
        const token = localStorage.getItem('userToken');
        if (!token) window.location.href = "login.html";

        const typeShowcase = document.getElementById('typeShowcase');
        const selectedTypePill = document.getElementById('selectedTypePill');
        const templateDesc = document.getElementById('templateDesc');
        const addForm = document.getElementById('addForm');
        
        let selectedTemplateId = null;

        const TEMPLATES = [
            { id: 'lamp', label: 'Éclairage', icon: 'fas fa-lightbulb', desc: 'Système d\'éclairage intelligent.' },
            { id: 'microphone', label: 'Microphone', icon: 'fas fa-microphone', desc: 'Audio d\'entrée (conférence, mural).' },
            { id: 'camera', label: 'Caméra', icon: 'fas fa-camera', desc: 'Surveillance vidéo IP.' },
            { id: 'sensor', label: 'Capteur', icon: 'fas fa-rss', desc: 'Détection environnementale (temp, présence).' },
            { id: 'ac', label: 'Climatiseur', icon: 'fas fa-snowflake', desc: 'Régulation thermique HVAC.' },
            { id: 'switch', label: 'Interrupteur', icon: 'fas fa-toggle-on', desc: 'Contrôle on/off distant.' },
            { id: 'coffee', label: 'Machine Café', icon: 'fas fa-coffee', desc: 'Distributeur de boissons connecté.' },
            { id: 'tv', label: 'Télévision', icon: 'fas fa-tv', desc: 'Écran et affichage dynamique.' },
            { id: 'scanner', label: 'Scanner', icon: 'fas fa-print', desc: 'Numérisation de documents réseau.' },
            { id: 'button', label: 'Bouton', icon: 'fas fa-fingerprint', desc: 'Appel d\'urgence ou sonnette.' },
            { id: 'access', label: 'Accès', icon: 'fas fa-id-card', desc: 'Lecteur de badge / Serrure.' },
            { id: 'alarm', label: 'Alarme', icon: 'fas fa-exclamation-triangle', desc: 'Sécurité et sirène.' },
            { id: 'printer', label: 'Imprimante', icon: 'fas fa-print', desc: 'Impression laser/jet d\'encre.' },
            { id: 'speaker', label: 'Haut-parleur', icon: 'fas fa-volume-up', desc: 'Diffusion sonore et annonces.' }
        ];

        function renderTemplates() {
            typeShowcase.innerHTML = TEMPLATES.map(t => `
                <div class="type-card" data-id="${t.id}">
                    <div class="type-icon"><i class="${t.icon}"></i></div>
                    <div class="font-bold">${t.label}</div>
                </div>
            `).join('');

            document.querySelectorAll('.type-card').forEach(card => {
                card.onclick = () => {
                    selectedTemplateId = card.dataset.id;
                    const t = TEMPLATES.find(x => x.id === selectedTemplateId);
                    
                    document.querySelectorAll('.type-card').forEach(c => c.classList.remove('active'));
                    card.classList.add('active');
                    
                    selectedTypePill.textContent = `Template: ${t.label}`;
                    selectedTypePill.classList.add('active');
                    templateDesc.textContent = t.desc;
                };
            });
        }

        addForm.onsubmit = async (e) => {
            e.preventDefault();
            if (!selectedTemplateId) return alert('Choisissez un template.');

            const data = {
                name: document.getElementById('objName').value,
                location: document.getElementById('objLoc').value
            };

            try {
                const res = await fetch(`${apiBase}/objects/add/${selectedTemplateId}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(data)
                });

                if (res.ok) {
                    alert('Objet créé avec succès !');
                    window.location.href = 'index.html';
                } else {
                    const err = await res.json();
                    alert(err.detail || 'Erreur lors de la création');
                }
            } catch (e) {
                alert('Erreur de connexion au serveur');
            }
        };

        renderTemplates();
    </script>
</body>
</html>
